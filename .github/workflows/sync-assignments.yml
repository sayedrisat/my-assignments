name: Sync Assignments

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Scan folders and update index files
        run: |
          python3 << 'EOF'
import os, re

# ─────────────────────────────────────────
# HELPERS
# ─────────────────────────────────────────

def sort_key(name):
    nums = re.findall(r'\d+', name)
    return [int(n) for n in nums]

def build_card(href, num_label, title, badge=""):
    return (
        f'      <a href="./{href}/" class="card">\n'
        f'        <span class="num">{num_label}</span>\n'
        f'        <span class="title">{title}</span>\n'
        f'        {badge}\n'
        f'        <span class="arrow">↗</span>\n'
        f'      </a>'
    )

def inject_cards(filepath, cards_html):
    with open(filepath, 'r') as f:
        content = f.read()
    if '<!-- ASSIGNMENTS_START -->' not in content:
        print(f"  ⚠ Skipped {filepath} — no placeholder found")
        return
    new_content = re.sub(
        r'<!-- ASSIGNMENTS_START -->.*?<!-- ASSIGNMENTS_END -->',
        f'<!-- ASSIGNMENTS_START -->\n{cards_html}\n      <!-- ASSIGNMENTS_END -->',
        content, flags=re.DOTALL
    )
    with open(filepath, 'w') as f:
        f.write(new_content)

SUB_PAGE_TEMPLATE = """\
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assignment {num}</title>
  <link rel="stylesheet" href="../style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="bg-grid"></div>
  <header>
    <div class="header-inner">
      <a href="../" class="back-link">← All Assignments</a>
      <div class="badge">Assignment {num}</div>
      <h1>Assignment {num}</h1>
      <p class="subtitle">Select a part to open</p>
    </div>
  </header>
  <main>
    <div class="grid" id="assignments">
      <!-- ASSIGNMENTS_START -->
      <!-- ASSIGNMENTS_END -->
    </div>
  </main>
  <footer>
    <span>Auto-synced with GitHub</span>
    <span class="dot">·</span>
    <span id="count">0 parts</span>
  </footer>
  <script>
    const cards = document.querySelectorAll('.card');
    document.getElementById('count').textContent = cards.length + ' part' + (cards.length !== 1 ? 's' : '');
    cards.forEach((c, i) => c.style.animationDelay = i * 80 + 'ms');
  </script>
</body>
</html>
"""

# ─────────────────────────────────────────
# STEP 1 — Update ROOT index.html
# Finds all assignment-*/ folders at root
# ─────────────────────────────────────────

root_folders = sorted(
    [d for d in os.listdir('.') if os.path.isdir(d) and re.match(r'^assignment-\d+', d)],
    key=sort_key
)

root_cards = []
for folder in root_folders:
    num = re.search(r'\d+', folder).group()
    sub_dirs = [s for s in os.listdir(folder) if os.path.isdir(os.path.join(folder, s))]
    badge = f'<span class="parts-badge">↓ {len(sub_dirs)} parts</span>' if sub_dirs else ''
    root_cards.append(build_card(folder, f'#{num.zfill(2)}', f'Assignment {num}', badge))

inject_cards('index.html', '\n'.join(root_cards))
print(f"✅ Root index.html — {len(root_folders)} assignment(s)")

# ─────────────────────────────────────────
# STEP 2 — For each assignment folder,
# check for sub-folders and auto-generate
# or update that assignment's index.html
# ─────────────────────────────────────────

for folder in root_folders:
    sub_folders = sorted(
        [s for s in os.listdir(folder) if os.path.isdir(os.path.join(folder, s))],
        key=sort_key
    )

    if not sub_folders:
        continue  # Normal assignment, no sub-folders needed

    num = re.search(r'\d+', folder).group()
    sub_index = os.path.join(folder, 'index.html')

    # Create the sub-page if it doesn't exist yet
    if not os.path.exists(sub_index):
        with open(sub_index, 'w') as f:
            f.write(SUB_PAGE_TEMPLATE.format(num=num.zfill(2)))
        print(f"✅ Created {sub_index}")

    # Build cards for each sub-folder
    sub_cards = []
    for i, sub in enumerate(sub_folders, 1):
        label = sub.replace('-', ' ').title()
        sub_cards.append(build_card(sub, f'Part {i}', label))

    inject_cards(sub_index, '\n'.join(sub_cards))
    print(f"✅ {sub_index} — {len(sub_folders)} part(s): {sub_folders}")

EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync assignments [skip ci]"
            git push
          fi
