<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squid Game</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>
<body>

    <div class="page">

        <nav>
            <img src="logosq.png" alt="logo" class="nav-logo">
            <ul>
                <li><a href="#">About</a></li>
                <li><a href="#" class="active">Watch now</a></li>
                <li><a href="#">Actors</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
            <div class="menu-icon">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>

        <div class="hero">

            <div class="hero-left">
                <div class="logo-box">
                    <img src="logosq.png" alt="Squid Game" class="big-logo">
                    <span class="star-cyan">&#10022;</span>
                    <span class="star-yellow">&#10022;</span>
                </div>
                <p class="desc">
                    Action / Thriller / Drama Series directed by Dong-hyuk Hwang<br>
                    Season 1: 9 Episodes
                </p>
                <div class="btns">
                    <button class="btn-play">&#9654; Play Now</button>
                    <button class="btn-watch">&#9654; Watch Trailer</button>
                </div>
            </div>

            <div class="scroll-mid">
                <div class="vline"></div>
                <p class="scroll-label">SCROLL</p>
            </div>

            <div class="hero-right">
                <img src="img4.jpg" alt="character" class="char">
                <p class="squid-bg">SQUID</p>
                <!-- Social Icons Container -->
                <div class="social">
                 <a href="#" class="facebook" aria-label="Facebook">
                  <i class="fa-brands fa-facebook-f"></i>
                 </a>
                 <a href="#" class="twitter" aria-label="X (Twitter)">
                   <i class="fa-brands fa-x-twitter"></i>
                 </a>
                 <a href="#" class="instagram" aria-label="Instagram">
                    <i class="fa-brands fa-instagram"></i>
               </a>
            </div>

            </div>

            <p class="game-bg">GAME</p>

        </div>

        <div class="cards">
            <div class="card">
                <img src="img1.jpg" alt="ep1">
                <div class="play-btn">&#9654;</div>
            </div>
            <div class="card">
                <img src="img2.jpg" alt="ep2">
                <div class="play-btn">&#9654;</div>
            </div>
            <div class="card">
                <img src="img3.jpg" alt="ep3">
                <div class="play-btn">&#9654;</div>
            </div>
        </div>

    </div>

</body>
</html>
